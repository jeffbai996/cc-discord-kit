{% extends "_base.html" %}
{% block title %}new deep entry{% endblock %}
{% block content %}

<div class="subtabs">
  <a href="{{ url_for('index') }}" class="subtab">memories</a>
  <a href="{{ url_for('deep_index') }}" class="subtab active">deep</a>
</div>

<p style="margin: 0 0 0.6rem;"><a href="{{ url_for('deep_index') }}">← deep memory</a></p>
<h2>new deep entry</h2>

{% if error %}
<div class="warn" style="background: rgba(207,122,0,0.15); border: 1px solid rgba(207,122,0,0.4); color: #ffa657; padding: 0.5rem 0.8rem; border-radius: 6px; margin-bottom: 0.8rem; font-size: 0.88rem;">
  ⚠ {{ error }}
</div>
{% endif %}

<form method="post" class="deep-form">
  <label>title
    <input name="title" value="{{ form.get('title', '') }}" required autocomplete="off">
  </label>
  <div class="deep-form-row">
    <label>category
      <input name="category" list="deep-cats" value="{{ form.get('category', '') }}" required autocomplete="off">
      <datalist id="deep-cats">{% for c in categories %}<option value="{{ c }}">{% endfor %}</datalist>
    </label>
    <label>filename
      <input name="fname" value="{{ form.get('fname', '') }}" placeholder="project_foo.md" required autocomplete="off">
    </label>
  </div>
  <label>description <span class="muted">(one line, shown in the index)</span>
    <input name="desc" value="{{ form.get('desc', '') }}" autocomplete="off">
  </label>
  <label>content <span class="muted">(markdown)</span>
    <textarea name="body" rows="22" spellcheck="false">{{ form.get('body', '') }}</textarea>
  </label>
  <div class="deep-form-actions">
    <button class="btn-primary" type="submit">create</button>
    <a class="btn btn-ghost" href="{{ url_for('deep_index') }}">cancel</a>
  </div>
</form>

{% endblock %}
