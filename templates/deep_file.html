{% extends "_base.html" %}
{% block title %}{{ fname }} — deep memory{% endblock %}
{% block content %}

<div class="subtabs">
  <a href="{{ url_for('index') }}" class="subtab">memories</a>
  <a href="{{ url_for('deep_index') }}" class="subtab">deep</a>
</div>

<div class="deep-file-head">
  <a href="{{ url_for('deep_index') }}" class="muted">← deep memory</a>
  <div class="deep-file-actions">
    <a class="btn btn-ghost" href="{{ url_for('deep_edit', fname=fname) }}">edit</a>
    <a class="btn btn-ghost" href="{{ url_for('deep_promote', fname=fname) }}"
       title="create an always-on store memory from this file's gist">→ store</a>
    <button type="button" class="btn btn-ghost" id="raw-toggle">raw</button>
    <button type="button" class="btn btn-ghost" id="copy-btn">copy</button>
    <form method="post" action="{{ url_for('deep_delete', fname=fname) }}"
          onsubmit="return confirm('Delete {{ fname }}? Removes the file + its index line and commits it. (Recoverable via git history.)');"
          style="display: inline; margin: 0;">
      <button type="submit" class="btn btn-ghost deep-del">delete</button>
    </form>
  </div>
</div>

<div class="meta" style="margin: 0.2rem 0 1rem;">
  <span style="font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.82rem;">deep/{{ fname }}</span>
  {% if mtime %}<span class="sep">·</span><span class="muted" style="font-size: 0.8rem;">edited {{ mtime }}</span>{% endif %}
</div>

<div class="deep-doc" id="deep-rendered">
  {{ html | safe }}
</div>
<pre class="deep-raw" id="deep-raw" hidden>{{ raw }}</pre>

<script>
(function () {
  var btn = document.getElementById('raw-toggle');
  var rendered = document.getElementById('deep-rendered');
  var raw = document.getElementById('deep-raw');
  if (!btn) return;
  btn.addEventListener('click', function () {
    var showRaw = raw.hasAttribute('hidden');
    raw.toggleAttribute('hidden', !showRaw);
    rendered.toggleAttribute('hidden', showRaw);
    btn.textContent = showRaw ? 'rendered' : 'raw';
  });
  var copy = document.getElementById('copy-btn');
  if (copy) copy.addEventListener('click', function () {
    navigator.clipboard.writeText(raw.textContent).then(function () {
      copy.textContent = 'copied ✓';
      setTimeout(function () { copy.textContent = 'copy'; }, 1500);
    });
  });
})();
</script>

{% endblock %}
