{% extends "_base.html" %}
{% block title %}add file{% endblock %}
{% block content %}

<div class="detail">
  <h2>add a shared file</h2>
  <p class="muted" style="font-size: 0.85rem;">
    Upload a file, or type/paste content for a text file. Text (.md/.txt/.json/code)
    is stored inline; other types are stored as a blob. The whole squad can read it.
  </p>

  <form method="post" action="{{ url_for('file_new') }}" enctype="multipart/form-data">
    <label>name</label>
    <input type="text" name="name" placeholder="e.g. silicon-railroads-thesis.md (inferred from upload if blank)">

    <label>upload a file (optional)</label>
    <input type="file" name="upload">

    <label>…or paste text content</label>
    <textarea name="content" data-charcount="#fnew-charcount"
              placeholder="for a text file — leave blank if uploading"></textarea>
    <span id="fnew-charcount" class="charcount"></span>

    <label>tags (comma-separated)</label>
    <input type="text" name="tags" placeholder="optional">

    <label>about (comma-separated subjects)</label>
    <input type="text" name="about" placeholder="optional">

    <label>bot scope (comma-separated, optional)</label>
    <input type="text" name="bot" placeholder="blank = all bots; e.g. a bot name to scope">

    <div class="toolbar">
      <button class="btn-primary" type="submit">add file</button>
      <a class="btn btn-ghost" href="{{ url_for('files_index') }}">cancel</a>
    </div>
  </form>
</div>

{% endblock %}
