# cc-discord-kit — agents registry example.
#
# Copy this to ~/.config/cc-discord-kit/agents.yaml and edit to match
# your setup. `personas.py` reads this on first endpoint hit.
#
# Each agent has any number of "slots" — named files the agent runtime
# expects in particular places (CLAUDE.md, persona.md, system_prompt.md,
# whatever). A slot is one (slot_name, absolute_path, mode) triple.
#
# mode: "plain"  — atomic write only
# mode: "git"    — atomic write + auto-commit in `git_repo` below
#
# Use mode=git for files that live inside a tracked repo so persona
# edits show up in version control. Use mode=plain for everything else.

# Optional: filesystem path to a git repo. Files written with mode=git
# get auto-committed here. Skip this key if no agents use mode=git.
git_repo: ~/repos/agent-configs

agents:
  agent-1:
    - slot: CLAUDE.md
      path: ~/repos/agent-configs/agent-1/CLAUDE.md
      mode: git
    - slot: persona.md
      path: ~/agents/agent-1/persona.md
      mode: plain

  agent-2:
    - slot: CLAUDE.md
      path: ~/agents/agent-2/CLAUDE.md
      mode: plain
    - slot: persona.md
      path: ~/agents/agent-2/persona.md
      mode: plain

  agent-3:
    - slot: persona.md
      path: ~/repos/agent-configs/agent-3/persona.md
      mode: git

  # Richer form (optional): instead of a bare slot list, an agent may be a
  # mapping with a `personas:` sub-key plus extra fields the fleet tooling
  # (bots_doctor.py, bot_config.py, capabilities.py) reads. personas.py
  # accepts both forms, so mix freely. Every extra field is optional — a
  # missing field just skips the doctor check that needs it.
  agent-4:
    kind: claude                       # "claude" (default) or a daemon kind, e.g. "service"
    config_dir: ~/.config/agent-4      # the agent's Claude config dir (for detect_bot)
    home_channel: "1234567890123456789"  # Discord channel id for card routing
    access_json: ~/.config/agent-4/channels/discord/access.json
    host: localhost                    # host the agent runs on
    transport: null                    # ssh-wrapper command for a remote host; null = local
    personas:
      - slot: CLAUDE.md
        path: ~/agents/agent-4/CLAUDE.md
        mode: plain

# Optional: per-agent metadata. Only used by the CLI today for the
# Discord card fallback when no --discord-chat-id is passed and the
# active Claude Code transcript has no <channel> tag. If you set
# discord_home_channel on an agent, any mutation from that agent's
# Claude Code session (CLAUDECODE=1) lands a card in the named channel.
# Leave it out and silent-by-default takes over.
agent_meta:
  agent-1:
    discord_home_channel: "1234567890123456789"
  agent-2:
    discord_home_channel: "9876543210987654321"

# Optional: per-bot access.json registry for bot_admin.py (the /bot slash
# admin surface). Each entry points at a bot's access.json so the helper
# can toggle per-channel flags (requireMention, narrate, tools, allowed).
#   schema: "claude" — Claude Code --channels access.json shape
#           "gemma"  — Gemini-style daemon access.json shape
#   remote: optional SSH-wrapper command; ops route through it instead of
#           touching the file locally (for bots whose files live on another
#           host). Omit for local bots.
# Leave this block out entirely if you don't use /bot admin.
bot_admin:
  my-bot-1:
    path: ~/.config/my-bot-1/channels/discord/access.json
    schema: claude
  my-bot-2:
    path: /remote/host/path/access.json
    schema: claude
    remote: my-ssh-wrapper
  my-bot-3:
    path: ~/.config/my-bot-3/access.json
    schema: gemma
